# UE5 Build & Test — Self-hosted Windows runner
# Requires: UE 5.7 installed, VS Build Tools, Git LFS
# Setup: Replace YOUR_RUNNER_LABEL and YOUR_UE_PATH before first run

name: UE5 Build & Test

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # Nightly at 04:00 UTC

concurrency:
  group: ue5-build-${{ github.ref }}
  cancel-in-progress: true

env:
  UE_ROOT: 'C:\Program Files\Epic Games\UE_5.7'
  PROJECT_FILE: '${{ github.workspace }}\GreymawChronicles.uproject'

jobs:
  build-and-test:
    name: Compile & Smoke Test (Win64 Development)
    runs-on: [self-hosted, windows, x64, chris-ai]
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          clean: true

      - name: Compile UE5 Editor target
        id: compile
        shell: cmd
        timeout-minutes: 45
        run: |
          echo === UE5 Build Start (Editor target) ===
          call "%UE_ROOT%\Engine\Build\BatchFiles\Build.bat" ^
            GreymawChroniclesEditor Win64 Development ^
            -Project="%PROJECT_FILE%" ^
            -WaitMutex -FromMsBuild ^
            -Log="%GITHUB_WORKSPACE%\Saved\Logs\Build.log"
          if errorlevel 1 (
            echo ::error::UE5 compilation failed
            exit /b 1
          )
          echo === UE5 Build Succeeded (Editor target) ===

      - name: Run automation tests (NullRHI headless)
        id: tests
        if: steps.compile.outcome == 'success'
        shell: powershell
        timeout-minutes: 10
        run: |
          Write-Host "=== Automation Tests Start ==="
          $ueCmd = Join-Path $env:UE_ROOT "Engine\Binaries\Win64\UnrealEditor-Cmd.exe"
          & $ueCmd `
            "$env:PROJECT_FILE" `
            '-ExecCmds=Automation RunTests Greymaw;Quit' `
            '-TestExit=Automation Test Queue Empty' `
            -Unattended -NullRHI `
            "-Log=$env:GITHUB_WORKSPACE\Saved\Logs\Tests.log" `
            "-ReportExportPath=$env:GITHUB_WORKSPACE\Saved\Automation"
          $testExit = $LASTEXITCODE
          Write-Host "=== Test process exited with code $testExit ==="
          if ($testExit -ne 0) {
            Write-Host "::error::One or more automation tests failed (exit code $testExit)"
            exit 1
          }
          Write-Host "=== Automation Tests Passed ==="

      - name: Print test log tail on failure
        if: failure() && steps.tests.outcome == 'failure'
        shell: powershell
        run: |
          Write-Host "=== Last 80 lines of test log ==="
          $logsDir = Join-Path $env:GITHUB_WORKSPACE "Saved\Logs"
          $candidates = @(
            (Join-Path $logsDir "Tests.log"),
            (Join-Path $logsDir "GreymawChronicles.log")
          )
          $found = $false
          foreach ($log in $candidates) {
            if (Test-Path $log) {
              Write-Host "--- $log ---"
              Get-Content $log -Tail 80
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Host "No known test log found. Listing Saved/Logs:"
            Get-ChildItem $logsDir -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          }

      - name: Upload build and test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            Saved/Logs/*.log
            Saved/Automation/**
          retention-days: 14
          if-no-files-found: warn
